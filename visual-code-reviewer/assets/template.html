<script>
"use strict";
(function () {
  const MANIFEST = "@@REVIEW_JSON@@";
  const TITLE = "@@TITLE_JSON@@";

  const $ = (id) => document.getElementById(id);
  const app = $("mv-app");
  const viewport = $("mv-viewport");
  const content = $("mv-content");
  const edgeSvg = $("rv-edges");
  const errorBox = $("mv-error");
  const toast = $("mv-toast");

  // A silent half-rendered canvas is undebuggable for the person looking at
  // it — surface any uncaught failure in the error box instead.
  const surfaceError = (msg) => {
    errorBox.textContent = "Viewer error: " + msg + "\n(Screenshot this and report it.)";
    errorBox.hidden = false;
    content.classList.add("ready"); // never leave whatever rendered invisible
  };
  window.addEventListener("error", (e) => surfaceError(e.message || String(e.error || e)));
  window.addEventListener("unhandledrejection", (e) => surfaceError(String((e.reason && e.reason.message) || e.reason)));

  const titleEl = $("mv-title");
  if (MANIFEST.url) {
    const a = document.createElement("a");
    a.href = MANIFEST.url;
    a.target = "_blank";
    a.rel = "noopener";
    a.textContent = TITLE;
    titleEl.appendChild(a);
  } else {
    titleEl.textContent = TITLE;
  }
  // Repo subtitle: "owner/repo #N" for PR urls, "owner/repo" for repo urls
  const prMatch = /^https:\/\/github\.com\/([^/]+)\/([^/]+)\/pull\/(\d+)/.exec(MANIFEST.url || "");
  const repoMatch = prMatch ? null
    : /^https:\/\/github\.com\/([^/]+)\/([^/]+)$/.exec((MANIFEST.url || "").replace(/\/+$/, ""));
  if (prMatch || repoMatch) {
    const m = prMatch || repoMatch;
    const sub = document.createElement("div");
    sub.className = "mv-subtitle";
    const a = document.createElement("a");
    a.href = MANIFEST.url;
    a.target = "_blank";
    a.rel = "noopener";
    a.textContent = m[1] + "/" + m[2] + (prMatch ? " #" + prMatch[3] : "");
    sub.appendChild(a);
    titleEl.appendChild(sub);
  }
  document.title = TITLE || document.title;

  // Sandboxed embeds (e.g. Claude artifacts) block some clipboard paths;
  // copyText below has a fallback
  const EMBEDDED = window.self !== window.top;

  // Mermaid classDef palette names -> fill/stroke/text, for shape colors
  const PALETTE = {
    coral:     ["#ff6b6b", "#c92a2a", "#fff"],
    ocean:     ["#4c6ef5", "#364fc7", "#fff"],
    forest:    ["#51cf66", "#2f9e44", "#fff"],
    sunshine:  ["#ffd43b", "#fab005", "#000"],
    grape:     ["#845ef7", "#5f3dc4", "#fff"],
    amber:     ["#ff922b", "#e8590c", "#fff"],
    teal:      ["#20c997", "#12b886", "#fff"],
    pink:      ["#ff8cc8", "#e64980", "#fff"],
    tangerine: ["#fd7e14", "#e8590c", "#fff"],
    sky:       ["#74c0fc", "#339af0", "#000"],
    lavender:  ["#d0bfff", "#9775fa", "#000"],
    mint:      ["#8ce99a", "#51cf66", "#000"],
    rose:      ["#ffa8a8", "#ff6b6b", "#000"],
    lemon:     ["#ffe066", "#ffd43b", "#000"],
    violet:    ["#a78bfa", "#8b5cf6", "#fff"],
    peach:     ["#ffc9c9", "#ffa8a8", "#000"],
  };
  const SEV_VAR = { P0: "--sev0", P1: "--sev1", P2: "--sev2" };
  const STATUS_META = {
    added:    ["A", "--status-a"],
    modified: ["M", "--status-m"],
    deleted:  ["D", "--status-d"],
    renamed:  ["R", "--status-r"],
  };
  const TYPE_ICON = {
    mermaid: "lu-workflow",
    diff: "lu-git-compare",
    excerpt: "lu-git-compare",
    changeset: "lu-layers",
    files: "lu-file",
    markdown: "lu-text",
    code: "lu-file-code",
    warning: "lu-triangle-alert",
    image: "lu-image",
    shape: "lu-workflow",
    callout: "lu-info",
  };
  const nodeIcon = (node) =>
    node.type === "callout" ? (CALLOUT_ICON[node.tone] || "lu-info") : (TYPE_ICON[node.type] || "lu-file");
  // Mode vocabulary: review = triage a diff; explain = tour existing code.
  // Everything mode-dependent reads M.* — no scattered mode branches.
  const MODES = {
    review:  { tab: "Review", meterVerb: "reviewed", groups: "risk",  allTargets: false, sourceTray: false },
    explain: { tab: "Tour",   meterVerb: "visited",  groups: "flat",  allTargets: true,  sourceTray: true },
  };
  const M = MODES[MANIFEST.mode] || MODES.review;

  // Callout tones -> accent color var + icon
  const TONE_VAR = { gotcha: "--sev1", tip: "--status-a", info: "--status-r" };
  const CALLOUT_ICON = { gotcha: "lu-triangle-alert", tip: "lu-lightbulb", info: "lu-info" };

  // Changeset kinds -> badge color (palette fills)
  const KIND_COLOR = {
    behavioral: "#845ef7",
    mechanical: "#737373",
    generated: "#a3a3a3",
    test: "#51cf66",
    docs: "#74c0fc",
    config: "#ff922b",
  };
  const RISK_VAR = { high: "--sev0", medium: "--sev1", low: "--gutter-fg" };

  // ---- Theme -------------------------------------------------------------
  const media = window.matchMedia("(prefers-color-scheme: dark)");
  let dark = media.matches;
  let followSystem = true;

  function applyTheme() {
    document.documentElement.dataset.theme = dark ? "dark" : "light";
  }
  media.addEventListener("change", (e) => {
    if (!followSystem) return;
    dark = e.matches;
    applyTheme();
    renderAllMermaid().then(redrawEdges);
  });
  $("mv-theme").addEventListener("click", () => {
    followSystem = false;
    dark = !dark;
    applyTheme();
    renderAllMermaid().then(redrawEdges);
  });

  // ---- Small helpers -------------------------------------------------------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function uniqueId(prefix) {
    return prefix + "-" + Date.now() + "-" + Math.random().toString(36).slice(2, 11);
  }

  function icon(symbolId, cls) {
    const NS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(NS, "svg");
    if (cls) svg.setAttribute("class", cls);
    const use = document.createElementNS(NS, "use");
    use.setAttribute("href", "#" + symbolId);
    svg.appendChild(use);
    return svg;
  }

  // ---- Minimal syntax highlighting -----------------------------------------
  // One permissive tokenizer for all languages: comments, strings, numbers,
  // and a merged keyword set. Line-scoped (no cross-line comment state) —
  // wrong occasionally, cheap always, and self-contained.
  const KEYWORDS = new Set(("function,const,let,var,return,if,else,for,while,do,class,import,export,from,new," +
    "async,await,try,catch,finally,throw,switch,case,break,continue,in,of,typeof,instanceof,this,super,extends," +
    "static,get,set,yield,delete,void,null,undefined,true,false,def,self,None,True,False,elif,lambda,with,as," +
    "pass,raise,not,and,or,is,global,nonlocal,assert,fn,pub,struct,impl,enum,match,mut,use,mod,crate,trait,where," +
    "func,go,chan,defer,select,type,interface,package,map,range,public,private,protected,final,abstract,int,long," +
    "float,double,bool,boolean,string,char,byte,short,unsigned,signed,sizeof,template,typename,namespace,using," +
    "virtual,override,operator,select,insert,update,delete,where,join,group,order,by,having,limit").split(","));
  const HL_RE = /(\/\/.*|\/\*[\s\S]*?(?:\*\/|$)|#.*)|("(?:[^"\\\n]|\\.)*"|'(?:[^'\\\n]|\\.)*'|`(?:[^`\\]|\\.)*`)|\b(0x[0-9a-fA-F]+|\d+(?:\.\d+)?)\b|\b([A-Za-z_]\w*)\b/g;

  function highlightInto(parent, text) {
    HL_RE.lastIndex = 0;
    let last = 0, m;
    while ((m = HL_RE.exec(text))) {
      if (m.index > last) parent.appendChild(document.createTextNode(text.slice(last, m.index)));
      const cls = m[1] ? "tk-com" : m[2] ? "tk-str" : m[3] ? "tk-num" : (KEYWORDS.has(m[4]) ? "tk-kw" : "");
      if (cls) {
        const s = document.createElement("span");
        s.className = cls;
        s.textContent = m[0];
        parent.appendChild(s);
      } else {
        parent.appendChild(document.createTextNode(m[0]));
      }
      last = m.index + m[0].length;
    }
    if (last < text.length) parent.appendChild(document.createTextNode(text.slice(last)));
  }

  // ---- Word-level intra-line diff -------------------------------------------
  // For a paired removed/added line, LCS over word tokens marks just the
  // tokens that changed. Bails (null) on huge lines or when almost nothing
  // matches — whole-line coloring reads better than confetti.
  function wordDiff(a, b) {
    if (a === b || !a || !b) return null;
    const ta = a.split(/(\W+)/).filter((t) => t !== "");
    const tb = b.split(/(\W+)/).filter((t) => t !== "");
    if (ta.length * tb.length > 20000) return null;
    const n = ta.length, m = tb.length;
    const dp = Array.from({ length: n + 1 }, () => new Array(m + 1).fill(0));
    for (let i = n - 1; i >= 0; i--)
      for (let j = m - 1; j >= 0; j--)
        dp[i][j] = ta[i] === tb[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
    const aChanged = new Array(n).fill(true), bChanged = new Array(m).fill(true);
    let i = 0, j = 0, matched = 0;
    while (i < n && j < m) {
      if (ta[i] === tb[j]) { aChanged[i] = false; bChanged[j] = false; matched += ta[i].length; i++; j++; }
      else if (dp[i + 1][j] >= dp[i][j + 1]) i++;
      else j++;
    }
    if (matched < Math.max(a.length, b.length) * 0.3) return null;
    const segs = (toks, changed) => {
      const out = [];
      toks.forEach((t, k) => {
        if (out.length && out[out.length - 1][1] === changed[k]) out[out.length - 1][0] += t;
        else out.push([t, changed[k]]);
      });
      return out;
    };
    return { a: segs(ta, aChanged), b: segs(tb, bChanged) };
  }

  // ---- Source renderer -------------------------------------------------------
  // Plain code with a line-number gutter and syntax highlighting — explain
  // mode shows code as it is, not as it changed.
  function renderSource(text, startLine) {
    const grid = document.createElement("div");
    grid.className = "rv-diff rv-src";
    let n = startLine || 1;
    for (const line of String(text).replace(/\n$/, "").split("\n")) {
      const ln = document.createElement("div");
      ln.className = "ln";
      ln.textContent = String(n++);
      const code = document.createElement("div");
      code.className = "code";
      highlightInto(code, line);
      grid.appendChild(ln);
      grid.appendChild(code);
    }
    return grid;
  }

  // ---- Diff renderer -------------------------------------------------------
  // Renders a unified diff as a 4-column grid: old line, new line, marker, code.
  // Long runs of unchanged context fold behind a "⋯ N unchanged lines" row
  // (click to reveal), GitHub-style. Malformed input falls back to a plain <pre>.
  const FOLD_KEEP = 3; // context lines kept visible on each side of a fold

  function renderDiff(text) {
    const lines = String(text).split("\n");
    if (!lines.some((l) => l.startsWith("@@"))) {
      const pre = document.createElement("pre");
      pre.className = "rv-plain";
      highlightInto(pre, String(text));
      return pre;
    }
    // Classify first so context runs can be folded before building DOM
    const entries = []; // {kind:"span",cls,text} | {kind:"row",cls,o,n,mark,code}
    let oldLn = 0, newLn = 0;
    for (const line of lines) {
      if (line.startsWith("diff --git") || line.startsWith("index ")
          || line.startsWith("new file") || line.startsWith("deleted file")
          || line.startsWith("similarity") || line.startsWith("rename ")
          || line.startsWith("---") || line.startsWith("+++") || line.startsWith("\\")) {
        entries.push({ kind: "span", cls: "row-meta", text: line });
      } else if (line.startsWith("@@")) {
        const m = /^@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/.exec(line);
        if (m) { oldLn = parseInt(m[1], 10); newLn = parseInt(m[2], 10); }
        entries.push({ kind: "span", cls: "row-hunk", text: line });
      } else if (line.startsWith("+")) {
        entries.push({ kind: "row", cls: "row-add", o: "", n: String(newLn++), mark: "+", code: line.slice(1) });
      } else if (line.startsWith("-")) {
        entries.push({ kind: "row", cls: "row-del", o: String(oldLn++), n: "", mark: "−", code: line.slice(1) });
      } else {
        entries.push({
          kind: "row", cls: null,
          o: String(oldLn++), n: String(newLn++), mark: " ",
          code: line.startsWith(" ") ? line.slice(1) : line,
        });
      }
    }

    // Pair removed/added runs for word-level emphasis: k-th del line in a run
    // pairs with the k-th add line that follows it
    for (let s = 0; s < entries.length; s++) {
      if (!(entries[s].kind === "row" && entries[s].cls === "row-del")) continue;
      let de = s;
      while (de < entries.length && entries[de].kind === "row" && entries[de].cls === "row-del") de++;
      let ae = de;
      while (ae < entries.length && entries[ae].kind === "row" && entries[ae].cls === "row-add") ae++;
      const pairs = Math.min(de - s, ae - de);
      for (let k = 0; k < pairs; k++) {
        const w = wordDiff(entries[s + k].code, entries[de + k].code);
        if (w) { entries[s + k].segs = w.a; entries[de + k].segs = w.b; }
      }
      s = ae - 1;
    }

    const grid = document.createElement("div");
    grid.className = "rv-diff";
    const emit = (parent, e) => {
      if (e.kind === "span") {
        const d = document.createElement("div");
        d.className = e.cls;
        d.style.gridColumn = "1 / -1";
        d.textContent = e.text;
        parent.appendChild(d);
        return;
      }
      for (const [c, t] of [["ln", e.o], ["ln", e.n], ["mk", e.mark], ["code", e.code]]) {
        const d = document.createElement("div");
        d.className = c;
        if (c === "code") {
          if (e.segs) {
            for (const [text, changed] of e.segs) {
              if (changed) {
                const w = document.createElement("span");
                w.className = "dw";
                highlightInto(w, text);
                d.appendChild(w);
              } else {
                highlightInto(d, text);
              }
            }
          } else {
            highlightInto(d, t);
          }
        } else {
          d.textContent = t;
        }
        if (e.cls) d.classList.add(e.cls);
        parent.appendChild(d);
      }
    };
    const isCtx = (e) => e && e.kind === "row" && e.cls === null;

    let i = 0;
    while (i < entries.length) {
      if (!isCtx(entries[i])) { emit(grid, entries[i]); i++; continue; }
      let j = i;
      while (j < entries.length && isCtx(entries[j])) j++;
      const run = j - i;
      if (run > FOLD_KEEP * 2 + 2) {
        for (let k = i; k < i + FOLD_KEEP; k++) emit(grid, entries[k]);
        const fold = document.createElement("div");
        fold.className = "row-fold";
        fold.style.gridColumn = "1 / -1";
        fold.textContent = "⋯ " + (run - FOLD_KEEP * 2) + " unchanged lines ⋯";
        const wrap = document.createElement("div");
        wrap.className = "rv-foldwrap";
        wrap.hidden = true;
        for (let k = i + FOLD_KEEP; k < j - FOLD_KEEP; k++) emit(wrap, entries[k]);
        fold.addEventListener("click", (e) => {
          e.stopPropagation();
          wrap.hidden = false;
          fold.remove();
          redrawEdges();
        });
        grid.appendChild(fold);
        grid.appendChild(wrap);
        for (let k = j - FOLD_KEEP; k < j; k++) emit(grid, entries[k]);
      } else {
        for (let k = i; k < j; k++) emit(grid, entries[k]);
      }
      i = j;
    }
    return grid;
  }

  // ---- Markdown subset renderer ---------------------------------------------
  // Escapes ALL html first, then applies a small pattern set; hrefs are
  // restricted to http(s)/# so no scriptable URLs survive.
  function renderMarkdown(text) {
    let src = escapeHtml(text);

    const fences = [];
    src = src.replace(/```([^\n]*)\n([\s\S]*?)```/g, (_, _lang, body) => {
      fences.push(body.replace(/\n$/, ""));
      return "\u0000F" + (fences.length - 1) + "\u0000";
    });

    const inline = (s) =>
      s.replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>")
        .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, t, url) =>
          /^(https?:\/\/|#)/.test(url)
            ? '<a href="' + url + '" target="_blank" rel="noopener">' + t + "</a>"
            : m);

    const out = [];
    let list = null; // "ul" | "ol"
    const closeList = () => { if (list) { out.push("</" + list + ">"); list = null; } };
    for (const line of src.split("\n")) {
      const h = /^(#{1,3})\s+(.*)$/.exec(line);
      const ul = /^[-*]\s+(.*)$/.exec(line);
      const ol = /^\d+\.\s+(.*)$/.exec(line);
      const fence = /^\u0000F(\d+)\u0000$/.exec(line.trim());
      if (fence) {
        closeList();
        out.push("<pre><code>" + fences[+fence[1]] + "</code></pre>");
      } else if (h) {
        closeList();
        out.push("<h" + h[1].length + ">" + inline(h[2]) + "</h" + h[1].length + ">");
      } else if (ul) {
        if (list !== "ul") { closeList(); out.push("<ul>"); list = "ul"; }
        out.push("<li>" + inline(ul[1]) + "</li>");
      } else if (ol) {
        if (list !== "ol") { closeList(); out.push("<ol>"); list = "ol"; }
        out.push("<li>" + inline(ol[1]) + "</li>");
      } else if (!line.trim()) {
        closeList();
      } else {
        closeList();
        out.push("<p>" + inline(line) + "</p>");
      }
    }
    closeList();

    const div = document.createElement("div");
    div.className = "rv-md";
    div.innerHTML = out.join("\n");
    return div;
  }

  // ---- Node construction -----------------------------------------------------
  const nodes = MANIFEST.nodes || [];
  const edges = MANIFEST.edges || [];
  const nodeEls = {};  // id -> element
  const pos = {};      // id -> {x, y}; written by layout, then owned by drag

  // File references link out: an explicit safe `href` wins; otherwise, when the
  // manifest url is a GitHub PR, anchors carrying a repo-relative path (it must
  // contain a "/") resolve to the PR Files tab, whose per-file fragment is
  // "diff-" + SHA-256 of the path. Hashing is async, so hrefs land post-boot.
  const GH_PR = /^https:\/\/github\.com\/[^/]+\/[^/]+\/pull\/\d+/.exec(MANIFEST.url || "");
  // A plain repo url (no /pull/) links file refs to blob pages instead
  const GH_REPO = GH_PR ? null
    : /^https:\/\/github\.com\/[^/]+\/[^/]+$/.exec((MANIFEST.url || "").replace(/\/+$/, ""));

  function applyHref(anchor, node) {
    if (typeof node.href === "string" && /^https?:\/\//.test(node.href)) {
      anchor.href = node.href;
      delete anchor.dataset.path;
    }
  }

  async function linkifyFileRefs() {
    const repoAnchors = document.querySelectorAll("a.rv-path[data-path], a.rv-file[data-path]");
    if (GH_REPO) {
      for (const a of repoAnchors) {
        const path = a.dataset.path;
        if (!path.includes("/")) continue;
        a.href = GH_REPO[0] + "/blob/HEAD/" + path + (a.dataset.line ? "#L" + a.dataset.line : "");
      }
      return;
    }
    if (!GH_PR || !window.crypto || !crypto.subtle) return;
    const anchors = repoAnchors;
    for (const a of anchors) {
      const path = a.dataset.path;
      if (!path.includes("/")) continue; // short labels can't be hashed to a file anchor
      try {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(path));
        const hex = Array.from(new Uint8Array(buf), (b) => b.toString(16).padStart(2, "0")).join("");
        a.href = GH_PR[0] + "/files#diff-" + hex;
      } catch (e) { /* stay a plain span-like anchor */ }
    }
  }

  function makeHead(node) {
    const head = document.createElement("div");
    head.className = "rv-head";
    head.appendChild(icon(nodeIcon(node), "rv-icon"));
    if (node.type === "warning") {
      const sev = document.createElement("span");
      sev.className = "rv-sev";
      sev.textContent = node.severity;
      head.appendChild(sev);
    }
    if (node.type === "callout") {
      const tone = document.createElement("span");
      tone.className = "rv-sev";
      tone.textContent = node.tone.toUpperCase();
      tone.style.background = "var(" + (TONE_VAR[node.tone] || "--sev2") + ")";
      head.appendChild(tone);
    }
    if (node.type === "changeset" && node.kind) {
      const k = document.createElement("span");
      k.className = "rv-kind";
      k.textContent = node.kind;
      k.style.background = KIND_COLOR[node.kind] || "#737373";
      head.appendChild(k);
    }
    if ((node.type === "diff" || node.type === "excerpt") && node.status) {
      const meta = STATUS_META[node.status];
      const badge = document.createElement("span");
      badge.className = "rv-status";
      badge.textContent = meta[0];
      badge.style.background = "var(" + meta[1] + ")";
      head.appendChild(badge);
    }
    const title = document.createElement("span");
    title.className = "rv-title";
    title.textContent = node.title || node.file || node.type;
    title.title = title.textContent;
    head.appendChild(title);
    const fileRef = node.file && node.title ? node.file + (node.line ? ":" + node.line : "") : (node.line ? ":" + node.line : "");
    if (fileRef) {
      const f = document.createElement("a");
      f.className = "rv-file";
      f.target = "_blank";
      f.rel = "noopener";
      f.title = fileRef;
      // <bdi> keeps "path:line" reading left-to-right inside the RTL-ellipsis trick
      const b = document.createElement("bdi");
      b.textContent = fileRef;
      f.appendChild(b);
      if (node.file) f.dataset.path = node.file;
      if (node.line) f.dataset.line = node.line;
      applyHref(f, node);
      head.appendChild(f);
    }
    if (node.type === "diff" && (node.additions !== undefined || node.deletions !== undefined)) {
      const stats = document.createElement("span");
      stats.className = "rv-stats";
      stats.textContent = "+" + (node.additions || 0) + " −" + (node.deletions || 0);
      if (!fileRef) stats.style.marginLeft = "auto";
      head.appendChild(stats);
    }
    // The chevron collapses a card to its header; an authored-minimized diff
    // folds back into its chip instead
    const btn = document.createElement("button");
    btn.className = "rv-expand";
    btn.setAttribute("aria-label", "Collapse");
    btn.appendChild(icon("lu-chevron-down"));
    if (!fileRef && !(node.type === "diff" && node.additions !== undefined)) btn.style.marginLeft = "auto";
    btn.addEventListener("pointerdown", (e) => e.stopPropagation());
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const card = btn.closest(".rv-node");
      if (card.dataset.min === "1") {
        card.classList.add("rv-min");
        computeLayout(); // card shrinks back to a chip: close the gap
      } else {
        card.classList.toggle("collapsed");
        btn.setAttribute("aria-label", card.classList.contains("collapsed") ? "Expand" : "Collapse");
      }
      redrawEdges();
    });
    head.appendChild(btn);
    return head;
  }

  function buildNode(node) {
    if (node.type === "shape") return buildShape(node);

    const el = document.createElement("div");
    el.className = "rv-node";
    el.dataset.type = node.type;
    if (node.width) el.style.width = node.width + "px";

    if (node.type === "warning") {
      el.style.setProperty("--sev-color", "var(" + SEV_VAR[node.severity] + ")");
    }
    if (node.type === "callout") {
      el.style.setProperty("--sev-color", "var(" + (TONE_VAR[node.tone] || "--sev2") + ")");
    }
    if (node.risk) {
      el.dataset.risk = node.risk;
      el.style.setProperty("--risk-color", "var(" + (RISK_VAR[node.risk] || "--card-border") + ")");
    }

    // Minimized diffs start life as a compact file chip (status badge, path,
    // ±stats); clicking the chip expands it into the full diff card, and the
    // card's chevron folds it back into a chip
    if (node.type === "diff" && node.minimized) {
      el.classList.add("rv-min");
      el.dataset.min = "1"; // identity survives expansion, for the hide toggle
      el.title = "Click to expand";
      const rowEl = document.createElement("div");
      rowEl.className = "rv-filerow";
      const meta = STATUS_META[node.status || "modified"];
      const badge = document.createElement("span");
      badge.className = "rv-status";
      badge.textContent = meta[0];
      badge.style.background = "var(" + meta[1] + ")";
      rowEl.appendChild(badge);
      const path = document.createElement("a");
      path.className = "rv-path";
      path.target = "_blank";
      path.rel = "noopener";
      path.textContent = node.file || node.title || "diff";
      if (node.file) path.dataset.path = node.file;
      applyHref(path, node);
      rowEl.appendChild(path);
      if (node.additions !== undefined || node.deletions !== undefined) {
        const stats = document.createElement("span");
        stats.className = "rv-stats";
        stats.textContent = "+" + (node.additions || 0) + " −" + (node.deletions || 0);
        rowEl.appendChild(stats);
      }
      el.appendChild(rowEl);
      // Real drags never reach here — the moved-click guard swallows them
      el.addEventListener("click", (e) => {
        if (!el.classList.contains("rv-min")) return;
        if (e.target.closest("a[href]")) return; // path link navigates instead
        el.classList.remove("rv-min");
        // A chip becomes a 720px card: relayout so it never lands on a
        // neighbor (manual drag positions reset — the map is auto-laid anyway)
        computeLayout();
        redrawEdges();
      });
    }

    if (node.type === "files" && !node.title) {
      node.title = "Changed files (" + (node.files || []).length + ")";
    }

    const head = makeHead(node);
    el.appendChild(head);

    const body = document.createElement("div");
    body.className = "rv-body";
    if (node.type === "diff") {
      body.appendChild(renderDiff(node.content));
    } else if (node.type === "excerpt") {
      if (node.note) {
        const note = renderMarkdown(node.note);
        note.classList.add("rv-excerpt-note");
        body.appendChild(note);
      }
      // A slice with no @@ hunks but a line number is plain source, not a diff
      const hasHunk = String(node.content).split("\n").some((l) => l.startsWith("@@"));
      if (!hasHunk && node.line !== undefined) body.appendChild(renderSource(node.content, node.line));
      else body.appendChild(renderDiff(node.content));
    } else if (node.type === "changeset") {
      if (node.note) body.appendChild(renderMarkdown(node.note));
      for (const slice of node.slices || []) {
        if (slice.file) {
          const sh = document.createElement("div");
          sh.className = "rv-slice-head";
          const a = document.createElement("a");
          a.className = "rv-path";
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = slice.file + (slice.line ? ":" + slice.line : "");
          a.dataset.path = slice.file;
          sh.appendChild(a);
          body.appendChild(sh);
        }
        body.appendChild(renderDiff(slice.content));
      }
    } else if (node.type === "files") {
      for (const entry of node.files || []) {
        const row = document.createElement("div");
        row.className = "rv-ftray-row";
        row.title = "Click to expand diff";
        row.appendChild(icon("lu-chevron-down", "rv-chev"));
        const meta = STATUS_META[entry.status || "modified"];
        const badge = document.createElement("span");
        badge.className = "rv-status";
        badge.textContent = meta[0];
        badge.style.background = "var(" + meta[1] + ")";
        row.appendChild(badge);
        const path = document.createElement("a");
        path.className = "rv-path";
        path.target = "_blank";
        path.rel = "noopener";
        path.textContent = entry.file;
        path.dataset.path = entry.file;
        row.appendChild(path);
        if (entry.lines !== undefined) {
          const stats = document.createElement("span");
          stats.className = "rv-stats";
          stats.textContent = entry.lines + " lines";
          row.appendChild(stats);
        } else if (entry.additions !== undefined || entry.deletions !== undefined) {
          const stats = document.createElement("span");
          stats.className = "rv-stats";
          stats.textContent = "+" + (entry.additions || 0) + " −" + (entry.deletions || 0);
          row.appendChild(stats);
        }
        const diffWrap = document.createElement("div");
        diffWrap.className = "rv-ftray-diff";
        diffWrap.hidden = true;
        // Diff DOM is built on first expand: a tray holds the whole PR, and
        // rendering thousands of rows nobody may open would slow boot
        let rendered = false;
        row.addEventListener("click", (e) => {
          if (e.target.closest("a[href]")) return; // path link navigates
          if (!rendered) {
            diffWrap.appendChild(M.sourceTray ? renderSource(entry.content, 1) : renderDiff(entry.content));
            rendered = true;
          }
          diffWrap.hidden = !diffWrap.hidden;
          row.classList.toggle("open", !diffWrap.hidden);
          // Widen the tray to diff width while any row is open
          el.classList.toggle("rv-open", !!body.querySelector(".rv-ftray-diff:not([hidden])"));
          redrawEdges();
        });
        body.appendChild(row);
        body.appendChild(diffWrap);
      }
    } else if (node.type === "code") {
      if (node.note) {
        const note = renderMarkdown(node.note);
        note.classList.add("rv-excerpt-note");
        body.appendChild(note);
      }
      if (node.line !== undefined) {
        body.appendChild(renderSource(node.content, node.line));
      } else {
        const pre = document.createElement("pre");
        pre.className = "rv-plain";
        highlightInto(pre, String(node.content));
        body.appendChild(pre);
      }
    } else if (node.type === "markdown" || node.type === "warning" || node.type === "callout") {
      body.appendChild(renderMarkdown(node.content));
    } else if (node.type === "image") {
      const img = document.createElement("img");
      img.src = node.src;
      img.alt = node.alt || node.title || "";
      body.appendChild(img);
    }
    // mermaid bodies are filled by renderAllMermaid()
    el.appendChild(body);

    // Hover copy on note-like cards: grabs the raw markdown content
    if (node.type === "markdown" || node.type === "warning" || node.type === "callout") {
      const cp = document.createElement("button");
      cp.className = "rv-copy";
      cp.title = "Copy content";
      cp.appendChild(icon("lu-copy"));
      cp.addEventListener("pointerdown", (e) => e.stopPropagation()); // no drag
      cp.addEventListener("click", (e) => {
        e.stopPropagation();
        copyText(String(node.content), "Copied");
      });
      el.appendChild(cp);
    }

    // Wheel scrolls the body when it has overflow, otherwise falls through to
    // canvas zoom
    body.addEventListener("wheel", (e) => {
      if (body.scrollHeight > body.clientHeight || body.scrollWidth > body.clientWidth) {
        e.stopPropagation();
      }
    }, { passive: true });

    // Text selection is disabled canvas-wide, so the whole card is a drag
    // handle. A tap on the header bar (not its links/chevron) toggles collapse.
    makeDraggable(el, node.id, el, (target) => {
      if (target.closest("a[href], button")) return;
      const headEl = target.closest(".rv-head");
      if (headEl && headEl.parentElement === el) {
        const b = headEl.querySelector(".rv-expand");
        if (b) b.click();
      }
    });
    return el;
  }

  function buildShape(node) {
    const el = document.createElement("div");
    el.className = "rv-shape";
    el.dataset.shape = node.shape;
    const colors = node.color && PALETTE[node.color];

    if (node.shape === "decision" || node.shape === "io") {
      const NS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(NS, "svg");
      svg.setAttribute("class", "rv-shape-svg");
      svg.setAttribute("preserveAspectRatio", "none");
      const poly = document.createElementNS(NS, "polygon");
      if (colors) {
        poly.style.fill = colors[0];
        poly.style.stroke = colors[1];
      }
      svg.appendChild(poly);
      el.appendChild(svg);
      const label = document.createElement("span");
      label.className = "rv-shape-label";
      label.textContent = node.label;
      if (node.shape === "decision") label.style.padding = "22px 34px";
      else label.style.padding = "10px 34px";
      if (colors) label.style.color = colors[2];
      el.appendChild(label);
      // Polygon points depend on the measured size; set after attach
      el._shapeFinalize = () => {
        const w = el.offsetWidth, h = el.offsetHeight;
        svg.setAttribute("viewBox", "0 0 " + w + " " + h);
        const pts = node.shape === "decision"
          ? [[w / 2, 1], [w - 1, h / 2], [w / 2, h - 1], [1, h / 2]]
          : [[Math.min(24, w / 4), 1], [w - 1, 1], [w - Math.min(24, w / 4), h - 1], [1, h - 1]];
        poly.setAttribute("points", pts.map((p) => p.join(",")).join(" "));
      };
    } else {
      el.textContent = node.label;
      if (colors) {
        el.style.background = colors[0];
        el.style.borderColor = colors[1];
        el.style.color = colors[2];
      }
    }
    makeDraggable(el, node.id, el);
    return el;
  }

  // ---- Mermaid rendering ------------------------------------------------------
  function mermaidConfig() {
    return {
      startOnLoad: false,
      theme: dark ? "dark" : "default",
      securityLevel: "strict",
      suppressErrorRendering: true,
      flowchart: { useMaxWidth: false, htmlLabels: true },
    };
  }

  // Crop the SVG viewBox to the bounding box of visible content (+20px pad).
  // Only leaf shapes count (group bboxes include hidden measurement elements
  // that mermaid parks at negative coordinates), and each leaf bbox is mapped
  // through its CTM into root space since mermaid positions via <g transform>.
  function trimSvgWhitespace(svgElement) {
    const rootCTM = svgElement.getScreenCTM();
    if (!rootCTM) return;
    const inv = rootCTM.inverse();
    const visible = svgElement.querySelectorAll(
      "rect, circle, ellipse, line, polyline, polygon, path, text, foreignObject, image");
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    visible.forEach((el) => {
      try {
        if (el.closest("defs")) return;
        const cs = getComputedStyle(el);
        if (cs.visibility === "hidden" || cs.display === "none" || cs.opacity === "0") return;
        if (el instanceof SVGGraphicsElement && el.getBBox) {
          const b = el.getBBox();
          if (!(b.width > 0 && b.height > 0)) return;
          const m = inv.multiply(el.getScreenCTM());
          for (const [cx, cy] of [[b.x, b.y], [b.x + b.width, b.y], [b.x, b.y + b.height], [b.x + b.width, b.y + b.height]]) {
            const p = new DOMPoint(cx, cy).matrixTransform(m);
            minX = Math.min(minX, p.x);
            minY = Math.min(minY, p.y);
            maxX = Math.max(maxX, p.x);
            maxY = Math.max(maxY, p.y);
          }
        }
      } catch (e) { /* some elements lack getBBox */ }
    });
    const pad = 20;
    const width = maxX - minX + pad * 2;
    const height = maxY - minY + pad * 2;
    if (width > 0 && height > 0 && isFinite(minX) && isFinite(minY)) {
      svgElement.setAttribute("viewBox", (minX - pad) + " " + (minY - pad) + " " + width + " " + height);
      svgElement.setAttribute("width", String(width));
      svgElement.setAttribute("height", String(height));
    }
  }

  // Serial: mermaid config is global, and renders must be attached+visible
  // for getBBox to work
  async function renderAllMermaid() {
    errorBox.hidden = true;
    const failures = [];
    mermaid.initialize(mermaidConfig());
    for (const node of nodes) {
      if (node.type !== "mermaid") continue;
      const body = nodeEls[node.id].querySelector(".rv-body");
      body.innerHTML = "";
      try {
        const { svg } = await mermaid.render(uniqueId("rv-" + node.id), node.content);
        body.innerHTML = svg;
        const svgEl = body.querySelector("svg");
        if (svgEl) {
          trimSvgWhitespace(svgEl);
          // Grow the card to the diagram's natural width (12px body padding
          // ×2 + 1px border ×2) so the SVG never overflows the node
          const svgW = parseFloat(svgEl.getAttribute("width")) || 0;
          const cardEl = nodeEls[node.id];
          const needed = Math.ceil(svgW + 26);
          if (needed > cardEl.offsetWidth) cardEl.style.width = needed + "px";
        }
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        const strip = document.createElement("div");
        strip.className = "rv-node-error";
        strip.textContent = "Diagram error: " + msg;
        body.appendChild(strip);
        failures.push((node.title || node.id) + ": " + msg);
      }
    }
    if (failures.length) {
      errorBox.textContent = "Diagram error in " + failures.length + " node(s):\n" + failures.join("\n");
      errorBox.hidden = false;
    }
  }

  // ---- Auto-layout --------------------------------------------------------------
  // Four algorithms, cycled by the layout button / R. The layered ones are
  // Sugiyama-style by edge topology: DFS cycle-break (back-edges are drawn but
  // ignored for layout), longest-path layering, alternating barycenter sweeps
  // for crossing reduction, then a neighbor-pull cross-axis pass so nodes line
  // up with what they connect to. Connected components lay out independently
  // and stack; edgeless nodes go in a trailing grid.
  const H_GAP = 120, V_GAP = 48, COMP_GAP = 100;

  // Nodes hidden by the minimized-files toggle keep their positions and are
  // laid out again next time they're visible
  function measureVisible() {
    const ids = nodes.map((n) => n.id).filter((id) => nodeEls[id].offsetWidth > 0);
    const size = {};
    ids.forEach((id) => {
      const el = nodeEls[id];
      size[id] = { w: el.offsetWidth, h: el.offsetHeight };
    });
    const valid = new Set(ids);
    const links = edges.filter((e) => e.from !== e.to && valid.has(e.from) && valid.has(e.to));
    return { ids, size, links };
  }

  // The layout button / R toggles between the two layered directions; each
  // writes `pos` for every visible node. Layered → is the default: the canvas
  // reads left-to-right from entry points.
  const LAYOUTS = [
    { name: "Layered →", fn: () => layoutLayered(true) },
    { name: "Layered ↓", fn: () => layoutLayered(false) },
  ];
  let layoutIdx = 0;

  function computeLayout() {
    LAYOUTS[layoutIdx].fn();
    applyPositions();
  }

  function layoutLayered(horiz) {
    const { ids, size, links } = measureVisible();
    // Flow axis (layers advance along it) vs cross axis (nodes stack across
    // it); horiz=true is the classic left-to-right layered layout
    const main = (id) => (horiz ? size[id].w : size[id].h);
    const cross = (id) => (horiz ? size[id].h : size[id].w);
    const place = (id, flowPos, crossPos) => {
      pos[id] = horiz ? { x: flowPos, y: crossPos } : { x: crossPos, y: flowPos };
    };

    // DFS cycle-break -> acyclic preds/succs
    const adj = {};
    ids.forEach((id) => (adj[id] = []));
    links.forEach((e) => adj[e.from].push(e.to));
    const preds = {}, succs = {};
    ids.forEach((id) => { preds[id] = []; succs[id] = []; });
    const seen = new Set(), onStack = new Set();
    function dfs(u) {
      seen.add(u);
      onStack.add(u);
      for (const v of adj[u]) {
        if (onStack.has(v)) continue; // back-edge: skip for layout
        succs[u].push(v);
        preds[v].push(u);
        if (!seen.has(v)) dfs(v);
      }
      onStack.delete(u);
    }
    ids.forEach((id) => { if (!seen.has(id)) dfs(id); });

    // Undirected components over ALL links, so cycle members stay together
    const und = {};
    ids.forEach((id) => (und[id] = []));
    links.forEach((e) => { und[e.from].push(e.to); und[e.to].push(e.from); });
    const compOf = {};
    const components = [];
    ids.forEach((id) => {
      if (compOf[id] !== undefined || !und[id].length) return;
      const comp = [];
      const queue = [id];
      compOf[id] = components.length;
      while (queue.length) {
        const u = queue.shift();
        comp.push(u);
        for (const v of und[u]) {
          if (compOf[v] === undefined) { compOf[v] = components.length; queue.push(v); }
        }
      }
      components.push(comp);
    });
    const isolated = ids.filter((id) => !und[id].length);

    // Longest-path layering per component (edges never cross components)
    const layer = {};
    components.forEach((comp) => {
      const indeg = {};
      comp.forEach((id) => { indeg[id] = preds[id].length; layer[id] = 0; });
      const q = comp.filter((id) => indeg[id] === 0);
      while (q.length) {
        const u = q.shift();
        for (const v of succs[u]) {
          layer[v] = Math.max(layer[v], layer[u] + 1);
          if (--indeg[v] === 0) q.push(v);
        }
      }
      // Tighten slack: longest-path parks every source at layer 0, which
      // leaves a node whose only edges point deep into the graph with a
      // needlessly long edge — pull such nodes up against their successors
      for (let pass = 0; pass < 2; pass++) {
        comp.forEach((id) => {
          if (!succs[id].length) return;
          const lo = Math.min.apply(null, succs[id].map((v) => layer[v])) - 1;
          if (lo > layer[id]) layer[id] = lo;
        });
      }
    });

    let compY = 0;
    components.forEach((comp) => {
      const layers = [];
      comp.forEach((id) => {
        const l = layer[id];
        (layers[l] = layers[l] || []).push(id);
      });

      // Crossing reduction: alternating down (preds) / up (succs) sweeps —
      // median heuristic first (robust to outliers), barycenter to fine-tune —
      // keeping whichever ordering counted the fewest crossings, like dot's
      // best-of bookkeeping. The count only sees adjacent-layer edges (there
      // are no virtual nodes for long edges), which is fine as a ranking.
      const order = {};
      layers.forEach((ly) => ly && ly.forEach((id, i) => (order[id] = i)));
      const inComp = new Set(comp);
      const compLinks = links.filter((e) => inComp.has(e.from));
      const bary = (id, nbrs) => {
        const n = nbrs[id];
        if (!n.length) return order[id];
        return n.reduce((s, q) => s + order[q], 0) / n.length;
      };
      const medi = (id, nbrs) => {
        const p = nbrs[id].map((q) => order[q]).sort((x, y) => x - y);
        if (!p.length) return order[id];
        const m = p.length >> 1;
        return p.length % 2 ? p[m] : (p[m - 1] + p[m]) / 2;
      };
      const crossings = () => {
        let x = 0;
        for (let l = 0; l + 1 < layers.length; l++) {
          const es = compLinks
            .filter((e) => layer[e.from] === l && layer[e.to] === l + 1)
            .map((e) => [order[e.from], order[e.to]])
            .sort((p, q) => p[0] - q[0] || p[1] - q[1]);
          for (let i = 0; i < es.length; i++)
            for (let j = i + 1; j < es.length; j++)
              if (es[i][1] > es[j][1]) x++;
        }
        return x;
      };
      let bestOrder = Object.assign({}, order);
      let bestX = crossings();
      for (let s = 0; s < 8; s++) {
        const nbrs = s % 2 === 0 ? preds : succs;
        const score = s < 4 ? medi : bary;
        layers.forEach((ly) => {
          if (!ly) return;
          ly.sort((a, b) => score(a, nbrs) - score(b, nbrs) || order[a] - order[b]);
          ly.forEach((id, i) => (order[id] = i));
        });
        const cx = crossings();
        if (cx < bestX) { bestX = cx; bestOrder = Object.assign({}, order); }
      }
      Object.assign(order, bestOrder);
      layers.forEach((ly) => {
        if (!ly) return;
        ly.sort((a, b) => order[a] - order[b]);
        ly.forEach((id, i) => (order[id] = i));
      });

      // Vertical placement: stack, then pull each node toward the mean center
      // of its neighbors, resolving overlaps while preserving in-layer order.
      // Alternate the resolution direction so the layer doesn't drift down.
      const yPos = {};
      layers.forEach((ly) => {
        if (!ly) return;
        let y = 0;
        ly.forEach((id) => { yPos[id] = y; y += cross(id) + V_GAP; });
      });
      for (let it = 0; it < 4; it++) {
        layers.forEach((ly) => {
          if (!ly) return;
          const desired = ly.map((id) => {
            const nbrs = [...preds[id], ...succs[id]];
            if (!nbrs.length) return yPos[id];
            const mean = nbrs.reduce((s, n) => s + yPos[n] + cross(n) / 2, 0) / nbrs.length;
            return mean - cross(id) / 2;
          });
          if (it % 2 === 0) {
            for (let i = 0; i < ly.length; i++) {
              const floor = i === 0 ? -Infinity : yPos[ly[i - 1]] + cross(ly[i - 1]) + V_GAP;
              yPos[ly[i]] = Math.max(desired[i], floor);
            }
          } else {
            for (let i = ly.length - 1; i >= 0; i--) {
              const ceil = i === ly.length - 1
                ? Infinity
                : yPos[ly[i + 1]] - V_GAP - cross(ly[i]);
              yPos[ly[i]] = Math.min(desired[i], ceil);
            }
          }
        });
      }

      // Normalize the component to its own origin, assign layer x, stack below
      // the previous component
      let minY = Infinity, maxY = -Infinity;
      comp.forEach((id) => {
        minY = Math.min(minY, yPos[id]);
        maxY = Math.max(maxY, yPos[id] + cross(id));
      });
      let x = 0;
      layers.forEach((ly) => {
        if (!ly || !ly.length) return;
        let maxMain = 0;
        ly.forEach((id) => {
          place(id, x, compY + (yPos[id] - minY));
          maxMain = Math.max(maxMain, main(id));
        });
        x += maxMain + H_GAP;
      });
      compY += (maxY - minY) + COMP_GAP;
    });

    // Edgeless nodes: a compact grid after the last component
    if (isolated.length) {
      const cols = Math.max(1, Math.ceil(Math.sqrt(isolated.length)));
      let gx = 0, gy = compY, rowH = 0, c = 0;
      isolated.forEach((id) => {
        place(id, gx, gy);
        rowH = Math.max(rowH, cross(id));
        gx += main(id) + H_GAP / 2;
        if (++c % cols === 0) { gx = 0; gy += rowH + V_GAP; rowH = 0; }
      });
    }
  }

  function applyPositions() {
    for (const id in pos) {
      const el = nodeEls[id];
      el.style.left = pos[id].x + "px";
      el.style.top = pos[id].y + "px";
    }
  }

  // ---- Edge drawing ---------------------------------------------------------------
  const edgeParts = []; // {path, label, edge}

  function initEdges() {
    const NS = "http://www.w3.org/2000/svg";
    for (const e of edges) {
      if (!nodeEls[e.from] || !nodeEls[e.to]) continue;
      const path = document.createElementNS(NS, "path");
      path.setAttribute("class", "rv-edge-line");
      path.setAttribute("marker-end", "url(#rv-arrow)");
      if (e.style === "dashed") path.setAttribute("stroke-dasharray", "6 4");
      edgeSvg.appendChild(path);
      let label = null;
      if (e.label) {
        label = document.createElementNS(NS, "text");
        label.textContent = e.label;
        edgeSvg.appendChild(label);
      }
      edgeParts.push({ path, label, edge: e });
    }
  }

  function nodeRect(id) {
    const el = nodeEls[id];
    return { x: pos[id] ? pos[id].x : 0, y: pos[id] ? pos[id].y : 0, w: el.offsetWidth, h: el.offsetHeight };
  }

  function anchor(rect, side) {
    switch (side) {
      case "left":   return [rect.x, rect.y + rect.h / 2];
      case "right":  return [rect.x + rect.w, rect.y + rect.h / 2];
      case "top":    return [rect.x + rect.w / 2, rect.y];
      case "bottom": return [rect.x + rect.w / 2, rect.y + rect.h];
    }
  }

  function redrawEdges() {
    let maxX = 0, maxY = 0;
    for (const id in nodeEls) {
      const r = nodeRect(id);
      maxX = Math.max(maxX, r.x + r.w);
      maxY = Math.max(maxY, r.y + r.h);
    }
    // Explicit size: Safari won't reliably paint overflow of a 0x0 svg
    edgeSvg.setAttribute("width", String(maxX + 200));
    edgeSvg.setAttribute("height", String(maxY + 200));

    for (const part of edgeParts) {
      const a = nodeRect(part.edge.from);
      const b = nodeRect(part.edge.to);
      // An endpoint that isn't visible hides its edges too
      const hidden = !a.w || !b.w;
      part.path.style.display = hidden ? "none" : "";
      if (part.label) part.label.style.display = hidden ? "none" : "";
      if (hidden) continue;
      const acx = a.x + a.w / 2, acy = a.y + a.h / 2;
      const bcx = b.x + b.w / 2, bcy = b.y + b.h / 2;
      const dx = bcx - acx, dy = bcy - acy;
      let sideA, sideB;
      if (Math.abs(dx) >= Math.abs(dy)) {
        sideA = dx >= 0 ? "right" : "left";
        sideB = dx >= 0 ? "left" : "right";
      } else {
        sideA = dy >= 0 ? "bottom" : "top";
        sideB = dy >= 0 ? "top" : "bottom";
      }
      const [x1, y1] = anchor(a, sideA);
      const [x2, y2] = anchor(b, sideB);
      const horiz = sideA === "left" || sideA === "right";
      const off = Math.min(80, Math.max(30, (horiz ? Math.abs(x2 - x1) : Math.abs(y2 - y1)) / 2));
      const c1 = horiz ? [x1 + (sideA === "right" ? off : -off), y1] : [x1, y1 + (sideA === "bottom" ? off : -off)];
      const c2 = horiz ? [x2 + (sideB === "right" ? off : -off), y2] : [x2, y2 + (sideB === "bottom" ? off : -off)];
      part.path.setAttribute("d",
        "M " + x1 + " " + y1 + " C " + c1[0] + " " + c1[1] + ", " + c2[0] + " " + c2[1] + ", " + x2 + " " + y2);
      if (part.label) {
        // Bezier midpoint (t=0.5)
        const mx = (x1 + 3 * c1[0] + 3 * c2[0] + x2) / 8;
        const my = (y1 + 3 * c1[1] + 3 * c2[1] + y2) / 8;
        part.label.setAttribute("x", String(mx));
        part.label.setAttribute("y", String(my - 6));
      }
    }
    updateMinimap();
  }

  // ---- Minimap --------------------------------------------------------------
  const MM_W = 220, MM_H = 150, MM_PAD = 8;
  const minimap = $("rv-minimap");
  const mmCanvas = $("rv-minimap-canvas");
  let mmScale = 1, mmOffX = 0, mmOffY = 0; // content px -> minimap px

  const cssVar = (name) =>
    getComputedStyle(document.documentElement).getPropertyValue(name).trim();

  // The minimap is an overlay nicety: it must never be able to break pan/zoom
  // or boot (it runs inside applyTransform), so any failure just disables it.
  function updateMinimap() {
    if (minimap.hidden) return;
    try {
      updateMinimapUnsafe();
    } catch (e) {
      minimap.hidden = true;
    }
  }

  function updateMinimapUnsafe() {
    const b = contentBBox();
    if (!b || !b.w || !b.h) return;
    const dpr = window.devicePixelRatio || 1;
    if (mmCanvas.width !== MM_W * dpr) {
      mmCanvas.width = MM_W * dpr;
      mmCanvas.height = MM_H * dpr;
    }
    const ctx = mmCanvas.getContext("2d");
    if (!ctx) throw new Error("no 2d context");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, MM_W, MM_H);

    mmScale = Math.min((MM_W - MM_PAD * 2) / b.w, (MM_H - MM_PAD * 2) / b.h);
    mmOffX = MM_PAD + ((MM_W - MM_PAD * 2) - b.w * mmScale) / 2 - b.x * mmScale;
    mmOffY = MM_PAD + ((MM_H - MM_PAD * 2) - b.h * mmScale) / 2 - b.y * mmScale;
    const toX = (v) => mmOffX + v * mmScale;
    const toY = (v) => mmOffY + v * mmScale;

    ctx.strokeStyle = cssVar("--edge");
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = 1;
    for (const part of edgeParts) {
      const a = nodeRect(part.edge.from);
      const t = nodeRect(part.edge.to);
      if (!a.w || !t.w) continue;
      ctx.beginPath();
      ctx.moveTo(toX(a.x + a.w / 2), toY(a.y + a.h / 2));
      ctx.lineTo(toX(t.x + t.w / 2), toY(t.y + t.h / 2));
      ctx.stroke();
    }

    ctx.globalAlpha = 0.9;
    ctx.fillStyle = cssVar("--mm-node");
    for (const node of nodes) {
      const r = nodeRect(node.id);
      if (!r.w || !r.h) continue; // hidden (e.g. minimized nodes toggled off)
      ctx.fillRect(toX(r.x), toY(r.y), Math.max(2, r.w * mmScale), Math.max(2, r.h * mmScale));
    }

    // Current viewport, in content coordinates. The docked explorer covers
    // the left edge, so the truly visible region starts at RAIL_W.
    const vr = viewport.getBoundingClientRect();
    const left = railOpen() ? RAIL_W : 0;
    ctx.globalAlpha = 1;
    ctx.strokeStyle = cssVar("--icon-hover-fg");
    ctx.lineWidth = 1.5;
    ctx.strokeRect(
      toX((left - panX) / zoom), toY(-panY / zoom),
      ((vr.width - left) / zoom) * mmScale, (vr.height / zoom) * mmScale);
  }

  function minimapCenterOn(e) {
    const rect = mmCanvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left - mmOffX) / mmScale;
    const cy = (e.clientY - rect.top - mmOffY) / mmScale;
    const vr = viewport.getBoundingClientRect();
    const left = railOpen() ? RAIL_W : 0;
    panX = left + (vr.width - left) / 2 - cx * zoom;
    panY = vr.height / 2 - cy * zoom;
    applyTransform();
  }
  let mmDragging = false;
  minimap.addEventListener("pointerdown", (e) => {
    if (e.button !== 0) return;
    e.stopPropagation();
    e.preventDefault();
    mmDragging = true;
    minimap.setPointerCapture(e.pointerId);
    minimapCenterOn(e);
  });
  minimap.addEventListener("pointermove", (e) => { if (mmDragging) minimapCenterOn(e); });
  const endMmDrag = () => (mmDragging = false);
  minimap.addEventListener("pointerup", endMmDrag);
  minimap.addEventListener("pointercancel", endMmDrag);
  minimap.addEventListener("wheel", (e) => e.stopPropagation(), { passive: true });

  function toggleMinimap() {
    minimap.hidden = !minimap.hidden;
    if (!minimap.hidden) updateMinimap();
  }

  // ---- Pan & zoom ----------------------------------------------------------
  // transform-origin is 0 0: screenPoint = pan + contentPoint * zoom
  const MIN_ZOOM = 0.1, MAX_ZOOM = 5, ZOOM_STEP = 1.2, FIT_PADDING = 40;
  let zoom = 1, panX = 0, panY = 0;

  const grid = $("mv-grid");
  function applyTransform() {
    content.style.transform = "translate(" + panX + "px," + panY + "px) scale(" + zoom + ")";
    // Grid spacing tracks zoom, anchored to the content origin, so dot
    // density reads as zoom level. Doubling/halving keeps the spacing inside
    // a readable band — at very low zoom raw spacing turns into dense moiré.
    let spacing = 20 * zoom;
    while (spacing > 0 && spacing < 14) spacing *= 2;
    while (spacing >= 56) spacing /= 2;
    grid.style.backgroundSize = spacing + "px " + spacing + "px";
    grid.style.backgroundPosition = panX + "px " + panY + "px";
    updateMinimap();
  }

  // Animated camera move: eased pan + log-space zoom over ~400ms. Any manual
  // interaction (wheel, canvas grab, a newer flight) cancels it mid-air.
  let flyToken = 0;
  function flyTo(tz, tx, ty, dur) {
    dur = dur || 400;
    const token = ++flyToken;
    const sz = zoom, sx = panX, sy = panY;
    if (sz === tz && sx === tx && sy === ty) return;
    const t0 = performance.now();
    const ease = (t) => 1 - Math.pow(1 - t, 3); // easeOutCubic
    const step = (now) => {
      if (token !== flyToken) return;
      const t = Math.min(1, (now - t0) / dur);
      const e = ease(t);
      zoom = sz * Math.pow(tz / sz, e); // log-space: constant perceived rate
      panX = sx + (tx - sx) * e;
      panY = sy + (ty - sy) * e;
      applyTransform();
      if (t < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  function zoomAt(cx, cy, newZoom) {
    flyToken++; // manual zoom cancels any flight
    newZoom = Math.min(Math.max(newZoom, MIN_ZOOM), MAX_ZOOM);
    panX = cx - ((cx - panX) / zoom) * newZoom;
    panY = cy - ((cy - panY) / zoom) * newZoom;
    zoom = newZoom;
    applyTransform();
  }

  function zoomCentered(factor) {
    const r = viewport.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, zoom * factor);
  }

  function contentBBox() {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const id in nodeEls) {
      const r = nodeRect(id);
      if (!r.w || !r.h) continue; // hidden by the minimized-nodes toggle
      minX = Math.min(minX, r.x);
      minY = Math.min(minY, r.y);
      maxX = Math.max(maxX, r.x + r.w);
      maxY = Math.max(maxY, r.y + r.h);
    }
    if (!isFinite(minX)) return null;
    return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
  }

  function fit() {
    const b = contentBBox();
    if (!b || !b.w || !b.h) return;
    const r = viewport.getBoundingClientRect();
    // Extra top padding keeps the floating title pill off the first row of
    // nodes; the open rail shifts the usable area right
    const padTop = 72;
    const left = railOpen() ? RAIL_W : 0;
    const scale = Math.min(
      (r.width - left - FIT_PADDING * 2) / b.w,
      (r.height - padTop - FIT_PADDING) / b.h);
    if (scale > 0 && isFinite(scale)) {
      zoom = Math.min(Math.max(scale, MIN_ZOOM), MAX_ZOOM);
      panX = left + (r.width - left - b.w * zoom) / 2 - b.x * zoom;
      panY = padTop + (r.height - padTop - FIT_PADDING - b.h * zoom) / 2 - b.y * zoom;
      applyTransform();
    }
  }

  viewport.addEventListener("wheel", (e) => {
    e.preventDefault();
    // Trackpads emit small deltas; mouse wheels emit large notched ones
    const isTrackpad = Math.abs(e.deltaY) < 50;
    const sensitivity = isTrackpad ? 0.01 : 0.02;
    const factor = Math.exp(-e.deltaY * sensitivity);
    const r = viewport.getBoundingClientRect();
    zoomAt(e.clientX - r.left, e.clientY - r.top, zoom * factor);
  }, { passive: false });

  let panning = false, startX = 0, startY = 0;
  viewport.addEventListener("pointerdown", (e) => {
    if (e.button !== 0) return;
    flyToken++; // grabbing the canvas cancels any flight
    panning = true;
    startX = e.clientX - panX;
    startY = e.clientY - panY;
    viewport.classList.add("panning");
    viewport.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  viewport.addEventListener("pointermove", (e) => {
    if (!panning) return;
    panX = e.clientX - startX;
    panY = e.clientY - startY;
    applyTransform();
  });
  const endPan = () => { panning = false; viewport.classList.remove("panning"); };
  viewport.addEventListener("pointerup", endPan);
  viewport.addEventListener("pointercancel", endPan);

  // ---- Node dragging ----------------------------------------------------------
  // onTap fires on release without movement, with the ORIGINAL pointerdown
  // target — needed because pointer capture retargets the eventual click to
  // `el`, so child elements (like the header) never receive click events.
  function makeDraggable(el, id, handle, onTap) {
    let dragging = false, moved = false, lastX = 0, lastY = 0, downTarget = null;
    let startX = 0, startY = 0;
    handle.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return;
      e.stopPropagation(); // never reaches the viewport pan handler
      e.preventDefault();
      dragging = true;
      moved = false;
      downTarget = e.target;
      startX = lastX = e.clientX;
      startY = lastY = e.clientY;
      el.classList.add("dragging");
      handle.setPointerCapture(e.pointerId);
    });
    handle.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      // Trackpad clicks jitter a few px: a drag only starts once the pointer
      // strays 5px from the press origin, so taps stay taps and the card
      // doesn't creep on click
      if (!moved) {
        if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) <= 5) return;
        moved = true;
        lastX = e.clientX;
        lastY = e.clientY;
        return;
      }
      // Deltas are screen px; positions are content px
      pos[id].x += (e.clientX - lastX) / zoom;
      pos[id].y += (e.clientY - lastY) / zoom;
      lastX = e.clientX;
      lastY = e.clientY;
      el.style.left = pos[id].x + "px";
      el.style.top = pos[id].y + "px";
      redrawEdges();
    });
    const end = () => { dragging = false; el.classList.remove("dragging"); };
    handle.addEventListener("pointerup", (e) => {
      const wasDrag = dragging && moved;
      end();
      if (!wasDrag && onTap && downTarget) onTap(downTarget);
      downTarget = null;
    });
    handle.addEventListener("pointercancel", end);
    // A release at the end of a real drag must not activate whatever is under
    // the pointer (e.g. a markdown link)
    el.addEventListener("click", (e) => {
      if (moved) {
        e.preventDefault();
        e.stopPropagation();
        moved = false;
      }
    }, true);
  }

  // ---- Narrative rail, selection, read tracking --------------------------------
  // The rail is the review in reading order (manifest order); the canvas is the
  // map. One selection drives both: rail click pans the map to the node, node
  // click highlights its rail entry. Attending to a node marks it read;
  // progress persists per manifest in localStorage (best-effort).
  const rail = $("rv-rail");
  const railList = $("rv-rail-list");
  const RAIL_W = 280;
  // Pinned = docked open (canvas shifts right). Unpinned = closed, but
  // hovering the left edge peeks it open as an overlay (canvas stays put).
  let railPinned = true;
  let railOverlay = false;
  const railOpen = () => railPinned; // docked width, for fit/focus/minimap math

  const idxOf = {}, nodeById = {};
  nodes.forEach((n, i) => { idxOf[n.id] = i; nodeById[n.id] = n; });

  // Review targets and their priority. Warnings inherit severity; anything
  // can carry an explicit `risk`; changesets/excerpts default medium, code
  // carriers default low; markdown/shape/mermaid/image are context, not
  // review obligations.
  const riskOf = (node) => {
    if (!node || node.type === "shape") return null;
    if (node.type === "warning") return node.severity === "P2" ? "medium" : "high";
    if (node.risk === "high" || node.risk === "medium" || node.risk === "low") return node.risk;
    if (node.type === "callout") return "medium";
    if (M.allTargets) return "medium"; // explain mode: every stop on the tour counts
    if (node.type === "changeset" || node.type === "excerpt") return "medium";
    if (node.type === "diff" || node.type === "files") return "low";
    return null;
  };
  const RANK = { high: 0, medium: 1, low: 2 };
  const targets = nodes.filter((n) => riskOf(n) !== null);
  const walkOrder = targets.slice()
    .sort((a, b) => (RANK[riskOf(a)] - RANK[riskOf(b)]) || (idxOf[a.id] - idxOf[b.id]))
    .map((n) => n.id);

  let sig = 0;
  const sigStr = nodes.map((n) => n.id).join("|");
  for (let i = 0; i < sigStr.length; i++) sig = (sig * 31 + sigStr.charCodeAt(i)) | 0;
  const storeKey = "rv-read:" + (MANIFEST.url || TITLE) + ":" + sig;
  let readSet = new Set();
  try { readSet = new Set(JSON.parse(localStorage.getItem(storeKey) || "[]")); } catch (e) { /* storage off */ }

  const railItems = {};
  let selectedId = null;

  function updateAttention() {
    const hi = targets.filter((n) => riskOf(n) === "high");
    const hiRead = hi.filter((n) => readSet.has(n.id)).length;
    const allRead = targets.filter((n) => readSet.has(n.id)).length;
    const att = $("rv-attention");
    att.textContent = "";
    const line = document.createElement("div");
    line.textContent =
      (hi.length ? hiRead + "/" + hi.length + " high-priority · " : "") +
      allRead + "/" + targets.length + " " + M.meterVerb;
    const bar = document.createElement("div");
    bar.className = "att-bar";
    const fill = document.createElement("div");
    fill.className = "att-fill";
    fill.style.width = (targets.length ? Math.round((allRead / targets.length) * 100) : 0) + "%";
    bar.appendChild(fill);
    att.appendChild(line);
    att.appendChild(bar);
  }

  function persistRead() {
    try { localStorage.setItem(storeKey, JSON.stringify(Array.from(readSet))); } catch (e) { /* storage off */ }
  }

  function markRead(id) {
    if (riskOf(nodeById[id]) === null || readSet.has(id)) return;
    readSet.add(id);
    persistRead();
    if (railItems[id]) railItems[id].classList.add("read");
    updateAttention();
  }

  function unmarkRead(id) {
    if (!readSet.has(id)) return;
    readSet.delete(id);
    persistRead();
    if (railItems[id]) railItems[id].classList.remove("read");
    updateAttention();
  }

  function setSelected(id, pan) {
    selectedId = id;
    document.querySelectorAll("#mv-content .selected").forEach((e) => e.classList.remove("selected"));
    const el = nodeEls[id];
    if (el && el.offsetWidth) el.classList.add("selected");
    for (const k in railItems) railItems[k].classList.toggle("active", k === id);
    if (railItems[id]) railItems[id].scrollIntoView({ block: "nearest" });
    markRead(id);
    if (pan && el && el.offsetWidth) {
      const r = nodeRect(id);
      const vr = viewport.getBoundingClientRect();
      const left = railOpen() ? RAIL_W : 0;
      const availW = vr.width - left;
      let z = Math.min((availW * 0.75) / r.w, (vr.height * 0.75) / r.h);
      z = Math.min(Math.max(z, 0.4), 1.25);
      flyTo(z,
        left + (availW - r.w * z) / 2 - r.x * z,
        (vr.height - r.h * z) / 2 - r.y * z);
    }
  }

  // Rail entries grouped by priority — the list mirrors the j/k walk and the
  // attention meter. Context nodes (summary, diagrams, images) lead in
  // manifest order; review targets follow under High/Medium/Low headers,
  // manifest order within each group. Shapes are map furniture, not items.
  function railItem(node) {
    const item = document.createElement("div");
    item.className = "rv-rail-item";
    item.appendChild(icon(TYPE_ICON[node.type] || "lu-file", "ri-icon"));
    const t = document.createElement("span");
    t.className = "ri-title";
    t.textContent = node.title || node.file || node.type;
    item.appendChild(t);
    const risk = riskOf(node);
    if (node.type === "warning") {
      const b = document.createElement("span");
      b.className = "ri-badge";
      b.textContent = node.severity;
      b.style.background = "var(" + SEV_VAR[node.severity] + ")";
      b.title = { P0: "P0 — must fix", P1: "P1 — should fix", P2: "P2 — nice to fix" }[node.severity];
      item.appendChild(b);
    }
    if (node.type === "callout") {
      const b = document.createElement("span");
      b.className = "ri-badge";
      b.textContent = { gotcha: "G", tip: "T", info: "i" }[node.tone] || "?";
      b.style.background = "var(" + (TONE_VAR[node.tone] || "--sev2") + ")";
      b.title = node.tone[0].toUpperCase() + node.tone.slice(1);
      item.appendChild(b);
    }
    if (risk) {
      const chk = icon("lu-check", "ri-check");
      chk.addEventListener("click", (e) => {
        e.stopPropagation(); // don't re-select (which would re-mark it read)
        unmarkRead(node.id);
      });
      const chkTitle = document.createElementNS("http://www.w3.org/2000/svg", "title");
      chkTitle.textContent = "Mark as not reviewed";
      chk.appendChild(chkTitle);
      item.appendChild(chk);
    }
    if (readSet.has(node.id)) item.classList.add("read");
    item.addEventListener("click", () => setSelected(node.id, true));
    railItems[node.id] = item;
    railList.appendChild(item);
  }
  function railGroup(label, riskVar, count) {
    const g = document.createElement("div");
    g.className = "rv-rail-group";
    const dot = document.createElement("span");
    dot.className = "rg-dot";
    dot.style.background = "var(" + riskVar + ")";
    g.appendChild(dot);
    g.appendChild(document.createTextNode(label + " "));
    const c = document.createElement("span");
    c.className = "rg-count";
    c.textContent = "(" + count + ")";
    g.appendChild(c);
    railList.appendChild(g);
  }
  // Section structure: author-declared `group` sections win in any mode
  // (subsystem chapters); otherwise review mode groups by risk tier and
  // explain mode stays flat in manifest (= tour) order.
  const groupNames = [];
  nodes.forEach((n) => {
    if (n.type !== "shape" && typeof n.group === "string" && !groupNames.includes(n.group)) groupNames.push(n.group);
  });
  if (groupNames.length) {
    nodes.forEach((n) => { if (n.type !== "shape" && n.group === undefined) railItem(n); });
    for (const g of groupNames) {
      const members = nodes.filter((n) => n.type !== "shape" && n.group === g);
      railGroup(g, "--gutter-fg", members.length);
      members.forEach(railItem);
    }
  } else if (M.groups === "risk") {
    nodes.forEach((n) => {
      if (n.type !== "shape" && riskOf(n) === null) railItem(n);
    });
    for (const tier of ["high", "medium", "low"]) {
      const members = nodes.filter((n) => n.type !== "shape" && riskOf(n) === tier);
      if (!members.length) continue;
      railGroup(tier === "high" ? "High priority" : tier === "medium" ? "Medium priority" : "Low priority", RISK_VAR[tier], members.length);
      members.forEach(railItem);
    }
  } else {
    nodes.forEach((n) => { if (n.type !== "shape") railItem(n); });
  }
  document.querySelector('#rv-rail-tabs [data-tab="review"]').textContent = M.tab;
  updateAttention();

  // Files tab: every changed file (standalone diff chips + files-tray rows)
  const filesList = $("rv-files-list");
  function addFileRow(file, status, additions, deletions, targetId) {
    const item = document.createElement("div");
    item.className = "rv-rail-item";
    const meta = STATUS_META[status] || STATUS_META.modified;
    const badge = document.createElement("span");
    badge.className = "rv-status";
    badge.textContent = meta[0];
    badge.style.background = "var(" + meta[1] + ")";
    item.appendChild(badge);
    const p = document.createElement("span");
    p.className = "ri-path";
    p.textContent = file;
    p.title = file;
    item.appendChild(p);
    if (additions !== undefined || deletions !== undefined) {
      const stats = document.createElement("span");
      stats.className = "rv-stats";
      stats.textContent = "+" + (additions || 0) + " −" + (deletions || 0);
      item.appendChild(stats);
    }
    item.addEventListener("click", () => setSelected(targetId, true));
    filesList.appendChild(item);
  }
  nodes.forEach((n) => {
    if (n.type === "diff") addFileRow(n.file || n.title || "diff", n.status || "modified", n.additions, n.deletions, n.id);
    else if (n.type === "files") (n.files || []).forEach((f) => addFileRow(f.file, f.status || "modified", f.additions, f.deletions, n.id));
  });

  const attention = $("rv-attention");
  document.querySelectorAll("#rv-rail-tabs .rv-tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll("#rv-rail-tabs .rv-tab").forEach((t) => t.classList.toggle("active", t === tab));
      const files = tab.dataset.tab === "files";
      railList.hidden = files;
      attention.hidden = files;
      filesList.hidden = !files;
    });
  });

  // Explorer state machine: pin docks it (canvas shifts), close unpins, and
  // while unpinned the left-edge hotzone peeks it open as an overlay. The
  // app/version/actions bar lives inside the explorer whenever it's visible.
  const watermark = $("mv-watermark");
  function applyRailState() {
    const visible = railPinned || railOverlay;
    rail.hidden = !visible;
    rail.classList.toggle("overlay", visible && !railPinned);
    app.classList.toggle("rail-open", railPinned);
    const pin = $("rv-pin");
    pin.classList.toggle("active", railPinned);
    pin.title = railPinned ? "Unpin explorer" : "Pin explorer";
    $("rv-menu-btn").hidden = visible;
    if (visible && watermark.parentElement !== rail) rail.appendChild(watermark);
    else if (!visible && watermark.parentElement !== app) app.appendChild(watermark);
  }
  function toggleRail() {
    railPinned = !railPinned;
    railOverlay = false;
    applyRailState();
    fit();
  }
  $("mv-rail-toggle").addEventListener("click", toggleRail);
  // Unpinning keeps the panel open as an overlay until the pointer leaves;
  // pinning from the overlay docks it
  $("rv-pin").addEventListener("click", () => {
    railOverlay = railPinned; // just-unpinned -> stay visible under the cursor
    railPinned = !railPinned;
    applyRailState();
    fit();
  });
  $("rv-menu-btn").addEventListener("click", () => {
    railPinned = true;
    railOverlay = false;
    applyRailState();
    fit();
  });
  $("rv-hotzone").addEventListener("mouseenter", () => {
    if (!railPinned && !railOverlay) { railOverlay = true; applyRailState(); }
  });
  rail.addEventListener("mouseleave", () => {
    if (!railPinned && railOverlay) { railOverlay = false; applyRailState(); }
  });
  applyRailState();

  // j/k: walk review targets by descending priority, skipping hidden nodes
  function walk(delta) {
    if (!walkOrder.length) return;
    let i = walkOrder.indexOf(selectedId);
    i = i === -1 ? (delta > 0 ? 0 : walkOrder.length - 1) : (i + delta + walkOrder.length) % walkOrder.length;
    for (let tries = 0; tries < walkOrder.length; tries++) {
      const el = nodeEls[walkOrder[i]];
      if (el && el.offsetWidth) break;
      i = (i + delta + walkOrder.length) % walkOrder.length;
    }
    setSelected(walkOrder[i], true);
  }

  // ---- Controls -----------------------------------------------------------------
  $("mv-zoom-in").addEventListener("click", () => zoomCentered(ZOOM_STEP));
  $("mv-zoom-out").addEventListener("click", () => zoomCentered(1 / ZOOM_STEP));
  $("mv-fit").addEventListener("click", fit);
  $("mv-relayout").addEventListener("click", () => {
    layoutIdx = (layoutIdx + 1) % LAYOUTS.length;
    computeLayout();
    redrawEdges();
    fit();
    showToast("Layout: " + LAYOUTS[layoutIdx].name);
    $("mv-relayout").dataset.tip =
      "Cycle layout (R) — next: " + LAYOUTS[(layoutIdx + 1) % LAYOUTS.length].name;
  });
  document.addEventListener("keydown", (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const t = e.target;
    if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA")) return;
    if (e.key === "f") fit();
    else if (e.key === "+" || e.key === "=") zoomCentered(ZOOM_STEP);
    else if (e.key === "-") zoomCentered(1 / ZOOM_STEP);
    else if (e.key === "0") { zoom = 1; panX = 0; panY = 0; applyTransform(); }
    else if (e.key === "d") $("mv-theme").click();
    else if (e.key === "r") $("mv-relayout").click();
    else if (e.key === "m") toggleMinimap();
    else if (e.key === "n") toggleRail();
    else if (e.key === "j") walk(1);
    else if (e.key === "k") walk(-1);
  });

  // ---- Toast / watermark ---------------------------------------------
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
  }

  async function copyText(text, doneMsg) {
    try {
      await navigator.clipboard.writeText(text);
      showToast(doneMsg);
    } catch (err) {
      // Clipboard API is unavailable in some sandboxed iframes
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.cssText = "position:absolute;left:-9999px;";
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      showToast(ok ? doneMsg : "Copy failed");
    }
  }

  $("mv-install").addEventListener("click", () =>
    copyText("npx skills add abrinsmead/skills/visual-code-reviewer", "Install command copied"));
  $("mv-update").addEventListener("click", () =>
    copyText("npx skills update visual-code-reviewer", "Update command copied"));
  $("mv-hide").addEventListener("click", () => {
    $("mv-watermark").style.display = "none";
  });

  // ---- Boot ------------------------------------------------------------------
  applyTheme();
  for (const node of nodes) {
    const el = buildNode(node);
    nodeEls[node.id] = el;
    content.appendChild(el);
    pos[node.id] = { x: 0, y: 0 };
    if (el._shapeFinalize) el._shapeFinalize();
    // Clicking a node selects it (rail syncs, counts as attended); real drags
    // land on child elements and are swallowed by the moved-click guard
    el.addEventListener("click", () => setSelected(node.id, false));
  }
  initEdges();
  renderAllMermaid().then(() => {
    computeLayout();
    redrawEdges();
    content.classList.add("ready");
    // Small delay so layout settles before measuring for fit
    setTimeout(fit, 50);
    linkifyFileRefs();
  });
})();
</script>
