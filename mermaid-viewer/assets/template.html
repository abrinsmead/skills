<style>
  /* Tailwind neutral palette, matching mindpilot-mcp's UI */
  :root {
    --bg: #f5f5f5;                        /* neutral-100 */
    --float-bg: rgba(255, 255, 255, 0.9); /* white/90 */
    --float-border: #e5e5e5;              /* neutral-200 */
    --icon: #404040;                      /* neutral-700 */
    --icon-hover-bg: #edf2ff;             /* pale tint of palette ocean */
    --icon-hover-fg: #364fc7;             /* ocean stroke color */
    --separator: #e5e5e5;                 /* neutral-200 */
    --pill-bg: rgba(212, 212, 212, 0.25); /* neutral-300/25 */
    --pill-fg: #525252;                   /* neutral-600 */
    --panel-bg: #fafafa;                  /* neutral-50 */
    --panel-border: #e5e5e5;              /* neutral-200 */
    --panel-fg: #262626;                  /* neutral-800 */
    --panel-dim: #737373;                 /* neutral-500 */
    --error-bg: #fef2f2;
    --error-text: #b91c1c;
    --grid-dot: rgba(0, 0, 0, 0.08);
  }
  [data-theme="dark"] {
    --bg: #262626;                        /* neutral-800 */
    --float-bg: rgba(38, 38, 38, 0.9);    /* neutral-800/90 */
    --float-border: #525252;              /* neutral-600 */
    --icon: #e5e5e5;                      /* neutral-200 */
    --icon-hover-bg: #404040;             /* neutral-700 */
    --icon-hover-fg: #74c0fc;             /* palette sky */
    --separator: #525252;                 /* neutral-600 */
    --pill-bg: rgba(23, 23, 23, 0.5);     /* neutral-900/50 */
    --pill-fg: #e5e5e5;                   /* neutral-200 */
    --panel-bg: #262626;                  /* neutral-800 */
    --panel-border: #404040;              /* neutral-700 */
    --panel-fg: #e5e5e5;                  /* neutral-200 */
    --panel-dim: #a3a3a3;                 /* neutral-400 */
    --error-bg: #450a0a;
    --error-text: #fca5a5;
    --grid-dot: rgba(255, 255, 255, 0.1);
  }
  #mv-app, #mv-app * { box-sizing: border-box; }
  #mv-app {
    position: fixed;
    inset: 0;
    background: var(--bg);
    color: var(--panel-fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }
  #mv-viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
    cursor: grab;
    touch-action: none;
  }
  #mv-viewport.panning { cursor: grabbing; }
  #mv-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(circle, var(--grid-dot) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  #mv-content {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
  }
  #mv-content svg { display: block; max-width: none !important; max-height: none !important; }

  /* Floating centered title pill */
  #mv-title-wrap {
    position: absolute;
    top: 16px; left: 0; right: 0;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 40;
  }
  #mv-title {
    margin: 0;
    padding: 8px 16px;
    border-radius: 8px;
    background: var(--pill-bg);
    color: var(--pill-fg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-size: 18px;
    font-weight: 400;
    text-align: center;
    pointer-events: auto;
    max-width: 70vw;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Floating control cluster, bottom right */
  #mv-controls {
    position: absolute;
    bottom: 16px; right: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--float-bg);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 1px solid var(--float-border);
    border-radius: 8px;
    padding: 4px;
    z-index: 50;
  }
  #mv-app.src-open #mv-controls { right: calc(min(480px, 90vw) + 16px); }
  #mv-controls button, #mv-src-head button {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: transparent;
    color: var(--icon);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    padding: 0;
  }
  #mv-controls button:hover, #mv-src-head button:hover {
    background: var(--icon-hover-bg);
    color: var(--icon-hover-fg);
  }
  #mv-controls svg, #mv-src-head svg { width: 16px; height: 16px; }
  /* CSS tooltips: shown to the left of the buttons after a short hover delay */
  [data-tip] { position: relative; }
  [data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    right: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%);
    background: var(--tooltip-bg);
    color: var(--tooltip-fg);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 400;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.15s;
    z-index: 100;
  }
  [data-tip]:hover::after {
    opacity: 1;
    visibility: visible;
    transition-delay: 0.4s;
  }
  :root { --tooltip-bg: #171717; --tooltip-fg: #fafafa; }
  [data-theme="dark"] { --tooltip-bg: #fafafa; --tooltip-fg: #171717; }
  #mv-controls .sep {
    width: 100%;
    height: 1px;
    background: var(--separator);
    margin: 4px 0;
  }
  [data-theme="dark"] .icon-moon { display: none; }
  :root:not([data-theme="dark"]) .icon-sun { display: none; }

  /* Source panel */
  #mv-source-panel {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: min(480px, 90vw);
    background: var(--panel-bg);
    border-left: 1px solid var(--panel-border);
    color: var(--panel-fg);
    z-index: 45;
    display: flex;
    flex-direction: column;
  }
  #mv-source-panel[hidden] { display: none; }
  #mv-src-head {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    border-bottom: 1px solid var(--panel-border);
    font-weight: 500;
  }
  #mv-src-actions {
    position: absolute;
    right: 8px;
    display: flex;
    gap: 2px;
  }
  #mv-src {
    margin: 0;
    padding: 16px;
    overflow: auto;
    flex: 1;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre;
    color: var(--panel-fg);
  }

  #mv-error {
    position: absolute;
    top: 72px; left: 50%;
    transform: translateX(-50%);
    max-width: min(600px, 90vw);
    background: var(--error-bg);
    color: var(--error-text);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    white-space: pre-wrap;
    z-index: 60;
  }
  #mv-error[hidden] { display: none; }
  #mv-toast {
    position: absolute;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: var(--float-bg);
    border: 1px solid var(--float-border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--panel-fg);
    z-index: 60;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  #mv-toast.show { opacity: 1; }
  #mv-watermark {
    position: absolute;
    bottom: 16px; left: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--panel-dim);
    background: var(--pill-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 4px 10px;
    border-radius: 6px;
    user-select: none;
    z-index: 30;
  }
  #mv-watermark a {
    color: inherit;
    text-decoration: none;
  }
  #mv-watermark a:hover { text-decoration: underline; }
  #mv-watermark .wm-sep { opacity: 0.5; }
  .wm-link {
    cursor: pointer;
  }
  .wm-link:hover { text-decoration: underline; }
</style>

<script>/*@@MERMAID_LIB@@*/</script>
<script>
"use strict";
(function () {
  const DIAGRAM = "@@DIAGRAM_JSON@@";
  const TITLE = "@@TITLE_JSON@@";

  const $ = (id) => document.getElementById(id);
  const app = $("mv-app");
  const viewport = $("mv-viewport");
  const content = $("mv-content");
  const errorBox = $("mv-error");
  const toast = $("mv-toast");

  $("mv-title").textContent = TITLE;
  $("mv-src").textContent = DIAGRAM;
  document.title = TITLE || document.title;

  // ---- Theme -------------------------------------------------------------
  const media = window.matchMedia("(prefers-color-scheme: dark)");
  let dark = media.matches;
  let followSystem = true;

  function applyTheme() {
    document.documentElement.dataset.theme = dark ? "dark" : "light";
  }
  media.addEventListener("change", (e) => {
    if (!followSystem) return;
    dark = e.matches;
    applyTheme();
    render().then(fit);
  });
  $("mv-theme").addEventListener("click", () => {
    followSystem = false;
    dark = !dark;
    applyTheme();
    render().then(fit);
  });

  // ---- Rendering ---------------------------------------------------------
  function mermaidConfig(htmlLabels) {
    return {
      startOnLoad: false,
      theme: dark ? "dark" : "default",
      securityLevel: "strict",
      suppressErrorRendering: true,
      flowchart: { useMaxWidth: false, htmlLabels: htmlLabels },
    };
  }

  function uniqueId(prefix) {
    return prefix + "-" + Date.now() + "-" + Math.random().toString(36).slice(2, 11);
  }

  // Crop the SVG viewBox to the bounding box of visible content (+20px pad)
  function trimSvgWhitespace(svgElement) {
    const visible = svgElement.querySelectorAll("*:not(defs):not(style):not(title):not(desc)");
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    visible.forEach((el) => {
      try {
        if (el instanceof SVGGraphicsElement && el.getBBox) {
          const b = el.getBBox();
          if (b.width > 0 && b.height > 0) {
            minX = Math.min(minX, b.x);
            minY = Math.min(minY, b.y);
            maxX = Math.max(maxX, b.x + b.width);
            maxY = Math.max(maxY, b.y + b.height);
          }
        }
      } catch (e) { /* some elements lack getBBox */ }
    });
    const pad = 20;
    const width = maxX - minX + pad * 2;
    const height = maxY - minY + pad * 2;
    if (width > 0 && height > 0 && isFinite(minX) && isFinite(minY)) {
      svgElement.setAttribute("viewBox", (minX - pad) + " " + (minY - pad) + " " + width + " " + height);
      svgElement.setAttribute("width", String(width));
      svgElement.setAttribute("height", String(height));
    }
  }

  async function render() {
    errorBox.hidden = true;
    content.innerHTML = "";
    if (!DIAGRAM || !DIAGRAM.trim()) return;
    try {
      mermaid.initialize(mermaidConfig(true));
      const { svg } = await mermaid.render(uniqueId("mermaid"), DIAGRAM);
      content.innerHTML = svg;
      const svgEl = content.querySelector("svg");
      if (svgEl) trimSvgWhitespace(svgEl);
    } catch (err) {
      errorBox.textContent = "Diagram error: " + (err && err.message ? err.message : String(err));
      errorBox.hidden = false;
    }
  }

  // ---- Pan & zoom ----------------------------------------------------------
  // transform-origin is 0 0: screenPoint = pan + diagramPoint * zoom
  const MIN_ZOOM = 0.1, MAX_ZOOM = 5, ZOOM_STEP = 1.2, FIT_PADDING = 40;
  let zoom = 1, panX = 0, panY = 0;

  const grid = $("mv-grid");
  function applyTransform() {
    content.style.transform = "translate(" + panX + "px," + panY + "px) scale(" + zoom + ")";
    // Grid spacing tracks zoom, anchored to the diagram origin, so dot
    // density reads as zoom level while the layer itself never moves
    const spacing = 20 * zoom;
    grid.style.backgroundSize = spacing + "px " + spacing + "px";
    grid.style.backgroundPosition = panX + "px " + panY + "px";
  }

  function zoomAt(cx, cy, newZoom) {
    newZoom = Math.min(Math.max(newZoom, MIN_ZOOM), MAX_ZOOM);
    panX = cx - ((cx - panX) / zoom) * newZoom;
    panY = cy - ((cy - panY) / zoom) * newZoom;
    zoom = newZoom;
    applyTransform();
  }

  function zoomCentered(factor) {
    const r = viewport.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, zoom * factor);
  }

  function fit() {
    const svgEl = content.querySelector("svg");
    if (!svgEl) return;
    let w = (svgEl.viewBox.baseVal && svgEl.viewBox.baseVal.width) || svgEl.width.baseVal.value;
    let h = (svgEl.viewBox.baseVal && svgEl.viewBox.baseVal.height) || svgEl.height.baseVal.value;
    if (!w || !h) {
      const b = svgEl.getBBox();
      w = b.width; h = b.height;
    }
    const r = viewport.getBoundingClientRect();
    const scale = Math.min((r.width - FIT_PADDING * 2) / w, (r.height - FIT_PADDING * 2) / h);
    if (scale > 0 && isFinite(scale)) {
      zoom = Math.min(Math.max(scale, MIN_ZOOM), MAX_ZOOM);
      panX = (r.width - w * zoom) / 2;
      panY = (r.height - h * zoom) / 2;
      applyTransform();
    }
  }

  viewport.addEventListener("wheel", (e) => {
    e.preventDefault();
    // Trackpads emit small deltas; mouse wheels emit large notched ones
    const isTrackpad = Math.abs(e.deltaY) < 50;
    const sensitivity = isTrackpad ? 0.01 : 0.02;
    const factor = Math.exp(-e.deltaY * sensitivity);
    const r = viewport.getBoundingClientRect();
    zoomAt(e.clientX - r.left, e.clientY - r.top, zoom * factor);
  }, { passive: false });

  let panning = false, startX = 0, startY = 0;
  viewport.addEventListener("pointerdown", (e) => {
    if (e.button !== 0) return;
    panning = true;
    startX = e.clientX - panX;
    startY = e.clientY - panY;
    viewport.classList.add("panning");
    viewport.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  viewport.addEventListener("pointermove", (e) => {
    if (!panning) return;
    panX = e.clientX - startX;
    panY = e.clientY - startY;
    applyTransform();
  });
  const endPan = () => { panning = false; viewport.classList.remove("panning"); };
  viewport.addEventListener("pointerup", endPan);
  viewport.addEventListener("pointercancel", endPan);

  $("mv-zoom-in").addEventListener("click", () => zoomCentered(ZOOM_STEP));
  $("mv-zoom-out").addEventListener("click", () => zoomCentered(1 / ZOOM_STEP));
  $("mv-fit").addEventListener("click", fit);

  document.addEventListener("keydown", (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === "f") fit();
    else if (e.key === "+" || e.key === "=") zoomCentered(ZOOM_STEP);
    else if (e.key === "-") zoomCentered(1 / ZOOM_STEP);
    else if (e.key === "0") { zoom = 1; panX = 0; panY = 0; applyTransform(); }
    else if (e.key === "d") $("mv-theme").click();
    else if (e.key === "s") toggleSource();
  });

  // ---- Export --------------------------------------------------------------
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
  }

  function slug() {
    return (TITLE || "diagram").replace(/[^a-z0-9]/gi, "_").toLowerCase();
  }

  function download(blob, filename) {
    try {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (err) {
      showToast("Download blocked in this context");
    }
  }

  // Re-render off-screen for export; htmlLabels:false avoids <foreignObject>
  // labels, which rasterize blank when the SVG is drawn to a canvas
  async function renderForExport(htmlLabels) {
    mermaid.initialize(mermaidConfig(htmlLabels));
    const tempDiv = document.createElement("div");
    tempDiv.style.cssText = "position:absolute;left:-9999px;top:-9999px;";
    document.body.appendChild(tempDiv);
    try {
      const { svg } = await mermaid.render(uniqueId("mermaid-export"), DIAGRAM);
      tempDiv.innerHTML = svg;
      const svgEl = tempDiv.querySelector("svg");
      if (!svgEl) throw new Error("Failed to render diagram");
      const clone = svgEl.cloneNode(true);
      const bbox = svgEl.getBBox();
      const width = bbox.width || 800;
      const height = bbox.height || 600;
      clone.setAttribute("width", String(width));
      clone.setAttribute("height", String(height));
      if (!clone.getAttribute("viewBox")) {
        clone.setAttribute("viewBox", "0 0 " + width + " " + height);
      }
      clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      // Strip external references that would taint the canvas
      clone.querySelectorAll("use, image").forEach((el) => {
        const href = el.getAttribute("href") || el.getAttribute("xlink:href");
        if (href && href.startsWith("http")) el.remove();
      });
      clone.querySelectorAll("style").forEach((style) => {
        if (style.textContent) {
          style.textContent = style.textContent.replace(/@import\s+url\([^)]+\);?/g, "");
        }
      });
      return { clone, width, height };
    } finally {
      document.body.removeChild(tempDiv);
    }
  }

  $("mv-png").addEventListener("click", async () => {
    try {
      const { clone, width, height } = await renderForExport(false);
      const canvas = document.createElement("canvas");
      const scale = 2;
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.fillStyle = dark ? "#262626" : "#f5f5f5";
      ctx.fillRect(0, 0, width, height);
      const svgData = new XMLSerializer().serializeToString(clone);
      const svgUrl = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
      const img = new Image();
      img.onerror = () => showToast("PNG export failed");
      img.onload = () => {
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          if (blob) download(blob, slug() + ".png");
          else showToast("PNG export failed");
        }, "image/png");
      };
      img.src = svgUrl;
    } catch (err) {
      showToast("PNG export failed: " + err.message);
    } finally {
      mermaid.initialize(mermaidConfig(true));
    }
  });

  $("mv-svg").addEventListener("click", async () => {
    try {
      const { clone } = await renderForExport(true);
      clone.style.backgroundColor = dark ? "#262626" : "#f5f5f5";
      const svgData = new XMLSerializer().serializeToString(clone);
      download(new Blob([svgData], { type: "image/svg+xml;charset=utf-8" }), slug() + ".svg");
    } catch (err) {
      showToast("SVG export failed: " + err.message);
    } finally {
      mermaid.initialize(mermaidConfig(true));
    }
  });

  // ---- Source panel ----------------------------------------------------------
  function toggleSource() {
    const panel = $("mv-source-panel");
    panel.hidden = !panel.hidden;
    app.classList.toggle("src-open", !panel.hidden);
  }
  $("mv-src-toggle").addEventListener("click", toggleSource);
  $("mv-src-close").addEventListener("click", toggleSource);

  async function copyText(text, doneMsg) {
    try {
      await navigator.clipboard.writeText(text);
      showToast(doneMsg);
    } catch (err) {
      // Clipboard API is unavailable in some sandboxed iframes
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.cssText = "position:absolute;left:-9999px;";
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      showToast(ok ? doneMsg : "Copy failed");
    }
  }

  $("mv-copy").addEventListener("click", () => copyText(DIAGRAM, "Copied"));
  $("mv-install").addEventListener("click", () =>
    copyText("npx skills add abrinsmead/skills/mermaid-viewer", "Install command copied"));
  $("mv-update").addEventListener("click", () =>
    copyText("npx skills update mermaid-viewer", "Update command copied"));
  $("mv-hide").addEventListener("click", () => {
    $("mv-watermark").style.display = "none";
  });

  // ---- Boot ------------------------------------------------------------------
  applyTheme();
  render().then(() => {
    // Small delay so layout settles before measuring for fit
    setTimeout(fit, 50);
  });
})();
</script>
